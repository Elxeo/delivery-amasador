<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Amasador | Panel de Pedidos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sniglet&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥟</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav class="navbar">
    <div class="nav-logo">
        <div class="logo-texto">
            AMASADOR
            <span class="slogan">Panel de Administración</span>
        </div>
    </div>
    <div class="nav-icons">
        <a href="index.html" class="cart-btn" style="text-decoration: none; color: white;">
            <i class="fas fa-store"></i> Tienda
        </a>
    </div>
</nav>

<main class="contenedor-principal">
    <section id="seccion-admin" class="seccion-contenido active">
        <div class="card card-wide">
            <header class="card-header-flex">
                <h2><i class="fas fa-clipboard-list"></i> Pedidos recibidos</h2>
                <button class="btn-secondary" id="btn-refrescar"><i class="fas fa-sync-alt"></i> Refrescar</button>
            </header>
            <div id="tarjetas-pedidos" class="tarjetas-grid">
                <div class="cargando-tarjetas">Cargando pedidos...</div>
            </div>
        </div>
    </section>
</main>

<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
